<!DOCTYPE html>
<html>
<!-- Mini Curso de Front-End -->
	<head>		
		<meta charset="ISO-8859-1">
		<title>Aula de HTML</title>
		
		<style type="text/css">
			body{
				text-transform: uppercase;
			}
		</style>
			
	</head>
	
	<body>
	
		<form action="" onsubmit="return validarDados()? true: false">
			
			<table style="background: #C71585;">
				<tr><td><label style="color: #F8F8FF;">Nome: </label></td></tr>
				<tr><td><input type="text" id="nome" name="nome"></td></tr>
				<tr><td><label style="color: #F8F8FF;">Login:</label></td></tr>
				<tr><td><input type="text" id="login" name="login"></td></tr>
				<tr><td><label style="color: #F8F8FF;">Senha:</label></td></tr>
				<tr><td><input type="password" id="pass" name="pass"></td></tr>
				<tr><td><input type="submit" value="Enviar" style="width:100%; border-radius:5px;"></td></tr>
			</table>
		
		</form>
		
		<script type="text/javascript">
		
			function validarDados() {
				var nome = document.getElementById("nome").value;
				var login = document.getElementById("login").value;
				var pass = document.getElementById("pass").value;
				
				if (nome == '') {
					alert('Informe o nome!');
					return false;
				} else if (login == '') {
					alert('Informe o login!');
					return false;
				} else if (pass == '') {
					alert('Informe a senha!');
					return false;
				} else {
					alert(nome + " - " + login + " - " + pass);
					return true;
				}
				
			}
		
		</script>
	
	</body>
	
</html>
